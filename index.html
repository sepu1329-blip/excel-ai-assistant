<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta http-equiv="X-UA-Compatible" content="IE=Edge">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Gemini AI Assistant</title>
  
  <!-- Office JavaScript API -->
  <script type="text/javascript" src="https://appsforoffice.microsoft.com/lib/1/hosted/office.js"></script>
  
  <!-- Marked.js for Markdown parsing -->
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  
  <!-- Font -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
  
  <!-- App Styles -->
  <link rel="stylesheet" href="styles.css" />
</head>
<body class="ms-font-m">
  <div id="app" class="app-container">
    
    <!-- Settings View -->
    <div id="settings-view" class="view visible">
      <div class="header">
        <h1>Settings</h1>
      </div>
      <div class="content">
        <div class="form-group">
          <label for="api-key">Gemini API Key</label>
          <input type="password" id="api-key" placeholder="AIzaSy..." />
        </div>
        <div class="form-group">
          <label for="model-select">Model</label>
          <select id="model-select">
            <option value="gemini-2.5-flash">Gemini 2.5 Flash</option>
            <option value="gemini-2.5-pro">Gemini 2.5 Pro</option>
          </select>
        </div>
        <button id="save-settings-btn" class="primary-btn">Save & Start</button>
      </div>
    </div>

    <!-- Main Chat View -->
    <div id="chat-view" class="view hidden">
      <div class="header chat-header">
        <h1>Gemini AI</h1>
        <div class="header-actions">
           <button id="clear-chat-btn" class="icon-btn" title="Clear Chat">
             <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="3 6 5 6 21 6"></polyline><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"></path><line x1="10" y1="11" x2="10" y2="17"></line><line x1="14" y1="11" x2="14" y2="17"></line></svg>
           </button>
           <button id="settings-btn" class="icon-btn" title="Settings">
             <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="3"></circle><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z"></path></svg>
           </button>
        </div>
      </div>
      
      <!-- Control Panel: Context & Mode -->
      <div class="controls-panel">
        <div class="control-group">
          <span class="control-label">Mode:</span>
          <div class="toggle-group mode-toggle">
            <button class="toggle-btn active" data-mode="ask">Ask</button>
            <button class="toggle-btn" data-mode="agent">Agent</button>
          </div>
        </div>
        <div class="control-group">
          <span class="control-label">Context:</span>
          <div class="toggle-group context-toggle">
            <button class="toggle-btn active" data-context="cell">Cell</button>
            <button class="toggle-btn" data-context="sheet">Sheet</button>
          </div>
        </div>
      </div>

      <!-- Chat History -->
      <div id="chat-history" class="chat-history">
        <div class="message system">
          <p>Welcome! Ask me anything or switch to Agent mode to modify the sheet.</p>
        </div>
      </div>

      <!-- Chat Input -->
      <div class="chat-input-area">
        <textarea id="chat-input" placeholder="Ask Gemini..." rows="2"></textarea>
        <button id="send-btn" class="send-btn">
           <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="22" y1="2" x2="11" y2="13"></line><polygon points="22 2 15 22 11 13 2 9 22 2"></polygon></svg>
        </button>
      </div>
    </div>
    
  </div>
  
  <script src="app.js"></script>
</body>
</html>
